backend:
  name: git-gateway
  branch: main
  local_backend: true

media_folder: "images"
public_folder: "/images"

collections:
  - name: "properties"
    label: "Properties"
    folder: "content/properties"
    create: true
    slug: "{{slug}}"
    format: "json"
    fields:
      - { label: "Property Title", name: "title", widget: "string", required: false }
      - { label: "Price", name: "price", widget: "string", required: false }
      - { label: "Location", name: "location", widget: "string", required: false }
      - { label: "Image (Flyer)", name: "image", widget: "image", required: false }
      - { label: "Extra Notes", name: "body", widget: "text", required: false }

      